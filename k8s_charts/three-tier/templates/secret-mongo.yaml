{{- if .Values.mongodb.enabled }}
apiVersion: v1
kind: Secret
metadata:
  namespace: {{ .Values.namespace }}
  name: {{ include "three-tier.fullname" . }}-mongo-secret
type: Opaque
data:
  username: {{ .Values.mongodb.auth.username | b64enc }}
  password: {{ .Values.mongodb.auth.password | b64enc }}
{{- end }}
