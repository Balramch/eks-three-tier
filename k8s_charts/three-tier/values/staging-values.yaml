# Staging Values Overlay
namespace: eks-test-staging

backend:
  enabled: true
  replicas: 2
  image:
    repository: 011528274726.dkr.ecr.eu-central-1.amazonaws.com/eks-backend
    tag: staging
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "400m"
      memory: "512Mi"
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 60

frontend:
  enabled: true
  replicas: 2
  image:
    repository: 011528274726.dkr.ecr.eu-central-1.amazonaws.com/eks-frontend
    tag: staging
    pullPolicy: IfNotPresent

mongodb:
  enabled: true
  auth:
    username: admin
    password: stagingpassword123
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "500m"

ingress:
  enabled: true
  ingressClassName: alb
  host: staging.app.example.com

imagePullSecrets:
  - name: ecr-secret
