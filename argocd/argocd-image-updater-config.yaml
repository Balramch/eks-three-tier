apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-image-updater-config
  namespace: argocd
data:
  config.yaml: |-
    registries:
      - name: aws-ecr
        api: ecr
        prefix: 011528274726.dkr.ecr.eu-central-1.amazonaws.com

    repositories:
      - name: three-tier-app
        url: https://github.com/Balramch/eks-three-tier.git
        usernameSecret:
          name: argocd-image-updater-repo-creds
          key: username
        passwordSecret:
          name: argocd-image-updater-repo-creds
          key: password
